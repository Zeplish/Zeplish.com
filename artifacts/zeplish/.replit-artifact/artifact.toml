kind = "web"
previewPath = "/"
title = "Zeplish"
version = "1.0.0"
id = "artifacts/zeplish"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19576

[services.development]
run = "pnpm --filter @workspace/zeplish run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zeplish", "run", "build" ]
publicDir = "artifacts/zeplish/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19576"
BASE_PATH = "/"
